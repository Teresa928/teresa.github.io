<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网页布局复刻-基础版</title>
    <style>
        body, h3, ul, li, div { margin: 0; padding: 0; list-style: none; }
        body { font-family: "Microsoft YaHei"; background-color: #f5f5f5; }

        .clearfix::after { content: ""; display: block; clear: both; }

        .header { background-color: #fff; padding: 20px 10%; }
        .logo { 
            float: left; 
            width: 300px; height: 50px; 
            background-color: #003366; color: #fff;
            text-align: center; line-height: 50px;
        }
        .search { float: right; margin-top: 10px; }

        .nav { background-color: #00529b; padding: 0 10%; height: 45px; }
        .nav li { 
            float: left; 
            color: #fff; padding: 0 20px; line-height: 45px; 
            cursor: pointer;
            transition: 0.3s; 
        }
        .nav li:hover { background-color: #003d74; }

        .banner { 
            width: 100%; height: 300px; 
            background-color: #ccc; 
            position: relative; 
        }
        .dots { 
            position: absolute; bottom: 20px; left: 50%; margin-left: -40px; 
        }
        .dot { 
            float: left; width: 12px; height: 12px; 
            background: #fff; margin: 0 5px;
            border-radius: 50%; 
        }

        .container { width: 80%; margin: 20px auto; }
        
        .main-news { float: left; width: 70%; }
        .news-box { border-bottom: 2px solid #00529b; margin-bottom: 10px; padding-bottom: 5px; }

        .featured-img { 
            float: left; width: 45%; height: 200px; 
            background-color: #ddd; position: relative; 
        }
        .news-list { float: right; width: 50%; }
        .news-item { 
            border-bottom: 1px dashed #ccc; padding: 10px 0; font-size: 14px; 
        }
        .tag { 
            background: #00529b; color: #fff; padding: 2px 8px; 
            margin-right: 10px; border-radius: 3px; 
        }

        .sidebar { float: right; width: 25%; }
        .link-btn { 
            display: block; background: #eee; padding: 15px; 
            margin-bottom: 10px; border: 1px solid #ddd;
            transition: 0.3s; 
        }
        .link-btn:hover { background: #fff; padding-left: 20px; }

        @media (max-width: 960px) {
            .main-news, .sidebar { 
                width: 100%; 
                float: none; 
            }
            .featured-img, .news-list {
                width: 100%; 
                float: none;
                margin-bottom: 15px;
            }
        }
    </style>
</head>
<body>

    <div class="header clearfix">
        <div class="logo">学校 LOGO 区域</div>
        <div class="search">🔍 <input type="text"></div>
    </div>

    <div class="nav">
        <ul class="clearfix">
            <li>首页</li>
            <li>部门概况</li>
            <li>人才培养</li>
            <li>教学运行</li>
        </ul>
    </div>

    <div class="banner">
        <div class="dots clearfix">
            <div class="dot" style="background:#ff9900"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    </div>

    <div class="container clearfix">
        <div class="main-news">
            <div class="news-box"><h3>教学新闻</h3></div>
            <div class="clearfix">
                <div class="featured-img"></div>
                <div class="news-list">
                    <div class="news-item"><span class="tag">教学质量</span> 学校座谈会新闻...</div>
                    <div class="news-item"><span class="tag">教学例会</span> 4月7日情况通报...</div>
                    <div class="news-item"><span class="tag">教学例会</span> 3月26日情况通报...</div>
                </div>
            </div>
        </div>

        <div class="sidebar">
            <div class="news-box"><h3>快速通道</h3></div>
            <div class="link-btn">选课中心</div>
            <div class="link-btn">教学管理</div>
            <div class="link-btn">下载中心</div>
        </div>
    </div>

</body>
</html>
